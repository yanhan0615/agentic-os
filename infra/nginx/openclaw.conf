server {
    listen 80;
    server_name openclaw.1702.store *.openclaw.1702.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name openclaw.1702.store *.openclaw.1702.store;

    ssl_certificate /etc/letsencrypt/live/openclaw.1702.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw.1702.store/privkey.pem;

    # Agentic OS 后端 API
    # 必须在前端 location 之前声明，nginx 按最长前缀匹配，
    # /agentic-os/api/ 比 /agentic-os 更具体，会优先匹配。
    # proxy_pass 不带尾部 /，保留完整请求路径转发给后端。
    # 后端 Hono basePath = /agentic-os/api，路径必须完整传入。
    location /agentic-os/api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Agentic OS 前端
    location /agentic-os {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
