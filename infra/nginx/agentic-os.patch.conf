##############################################################################
# infra/nginx/agentic-os.patch.conf
#
# ⚠️  这不是完整的 nginx 配置文件，不可直接覆盖生产配置。
#
# 部署方式（手动追加到现有 server 块）：
#   将下方两个 location 块追加到生产 nginx server {} 内，
#   确保 /agentic-os/api/ 出现在 /agentic-os/ 之前。
#
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################################

# ── 如何追加 ──────────────────────────────────────────────────────────────────
#
# 在生产的 server {} 块中找到现有的 /agentic-os/ location，
# 在它 **前面** 插入以下 API location：
#
#   server {
#       ...（保持现有 SSL、域名等配置不动）...
#
#       # ↓↓↓ 插入此块，必须写在 /agentic-os/ 之前 ↓↓↓
#       location /agentic-os/api/ {
#           proxy_pass         http://127.0.0.1:8765;
#           proxy_http_version 1.1;
#           proxy_set_header   Host              $host;
#           proxy_set_header   X-Real-IP         $remote_addr;
#           proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#           proxy_set_header   X-Forwarded-Proto $scheme;
#       }
#
#       # ↓↓↓ 现有的 SPA location，保持不动或参考补全 ↓↓↓
#       location /agentic-os/ {
#           alias /var/www/agentic-os/;
#           try_files $uri $uri/ /agentic-os/index.html;
#       }
#
#       ...（保持现有 SSL 证书、其他 location 等不动）...
#   }
#
# ─────────────────────────────────────────────────────────────────────────────

# ── 为什么 proxy_pass 末尾不能有斜线 ─────────────────────────────────────────
#
# ❌ 错误写法：
#   proxy_pass http://127.0.0.1:8765/;
#   → nginx 剥离 location 前缀后转发，后端收到 /wallpaper/today
#   → Hono basePath 是 /agentic-os/api，无法匹配 → 404
#
# ✅ 正确写法：
#   proxy_pass http://127.0.0.1:8765;
#   → nginx 转发完整原始 URI，后端收到 /agentic-os/api/wallpaper/today → 200
#
# ─────────────────────────────────────────────────────────────────────────────

# ── 需要追加的 location 块（复制此段到生产 server {} 内） ──────────────────────

location /agentic-os/api/ {
    proxy_pass         http://127.0.0.1:8765;   # 无尾部斜线，见上方说明
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}
